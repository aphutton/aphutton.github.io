    Experience:
      - company: Voytek Lab, UC San Diego
        position: Research Assistant & Data Engineer
        location: La Jolla, CA
        url: https://voyteklab.com/
        start_date: 2024-02
        end_date: Present
        summary: Biological Neural Network Projects and Electroencephalography Projects
        highlights:
          - Led project investigating the influence of distinct excitatory-inhibitory cell-type proportions on the development of network dynamics in human induced pluripotent stem cell (hiPSC)-derived cortical cultures.
          - Computationally modeled network connectivity and spectral features across hiPSC early development by employing graph-theoretical analyses, spectral parameterization, and spike synchrony analyses, to reveal underlying developmental dynamics in a novel system (distinct cell-type proportions with astrocytes).
          - Developed custom data pipelines for analysis of spike trains recorded from hiPSC neuronal cultures to quantify the oscillatory effects of pharmaceuticals designed to inhibit activity of different cell types (specifically glutamatergic and GABAergic neurons).
          - Implemented and modified open-source burst detection algorithms to identify time points of network burst activity in hiPSC cultures, guiding further analysis and characterization of nested oscillatory dynamics.
          - Investigated aperiodic and periodic oscillatory features of EEG recordings from non-verbal autism children receiving FDA-approved oral CBD preparations to identify treatment success and potential biomarkers correlated with symptom severity/reduction.
          - Utilized a spectral parameterization algorithm (specparam) and linear mixed effects models to parameterize neural power spectra into aperiodic and adjusted-periodic features, and analyzed components of EEG signals across treatment.
          - Optimized data pipelines with custom Python and MATLAB scripts to ensure accurate and efficient data cleaning, storage, analysis, and visualization of large multimodal datasets.

      - company: Neural Crossroads Lab, UC San Diego
        position: Research Assistant
        location: La Jolla, CA
        start_date: 2024-01
        end_date: 2025-04
        summary: In vivo electrophysiology
        highlights:
          - Manufactured in-house head stages for in vivo rat recordings, including assembling head stages and building tungsten tetrodes for recording target brain regions.
          - Implemented behavioral training regimens to condition rats to novel experimental paradigms.
          - Received training in animal surgery, including performing craniotomies in preparation for electrode implants.
          - Facilitated data acquisition for behavioral experiments in rats with multiple subcortical recording sites.
          - Scored behavioral video data, allowing integration with neural recording data in analysis pipelines.
          - Supported daily upkeep of on-site vivarium, adhering to stringent IACUC guidelines for animal care and safety.

      - company: STARTneuro Summer Research Training
        position: Research Trainee
        location: La Jolla, CA
        start_date: 2023-07
        end_date: 2023-09
        highlights:
          - Directed a capstone project using voltage-clamp recording on organotypic hippocampal slices from Alzheimer's Disease model mice to examine AMPA/NMDA-mediated responses in the CA1.
          - Conducted experiments using a variety of biology/neuroscience research methods (intracellular sharp electrode recording and whole-cell patch clamping, extracellular electrophysiology techniques and LFP analysis, immunohistochemistry and microscopy, genotyping, western blots).


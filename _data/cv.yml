  summary: >
    Incoming Ph.D. student in Cognitive Science at UC San Diego, working at the
    intersection of computational neuroscience, signal processing, and
    statistical modeling. My research investigates developmental dynamics of
    neural networks using human induced pluripotent stem cell (hiPSC) cortical
    cultures and human EEG.

